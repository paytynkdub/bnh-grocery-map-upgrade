<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grocery Map · WWU Basic Needs Hub</title>
  <meta name="description" content="Interactive grocery store map for Western Washington University's Basic Needs Hub." />

  <!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Marker Cluster CSS -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <!-- App styles -->
  <link rel="stylesheet" href="styles.css?v=99" />
</head>
<body>
<div id="app">

  <!-- ── Header ──────────────────────────────────────────────────── -->
  <header role="banner">
   <div class="header-brand">
  <img src="./bnh-logo.png" alt="Basic Needs Hub logo" class="brand-logo" />
  <div class="brand-text">
    <div class="brand-title">Basic Needs Hub</div>
    <div class="brand-sub">Western Washington University</div>
  </div>

    <button id="btn-wwu" aria-label="Center map on WWU campus">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
      </svg>
      Center on WWU
    </button>
    <a id="btn-wta"
   href="https://schedules.ridewta.com/"
   target="_blank"
   rel="noopener"
   aria-label="Open WTA Trip Planner in a new tab">
   🚌 WTA Trip Planner
</a>
  </header>

  <!-- ── Filter bar ───────────────────────────────────────────────── -->
  <div id="filter-bar" role="group" aria-label="Filter grocery stores">
    <span class="filter-label">Filter:</span>

    <button class="filter-chip" data-filter="ebt"
            aria-pressed="false">EBT Accepted</button>

    <button class="filter-chip" data-filter="discount"
            aria-pressed="false">Budget-Friendly</button>

    <button class="filter-chip" data-filter="supermarket"
            aria-pressed="false">🛒 Supermarket</button>

    <button class="filter-chip" data-filter="specialty"
            aria-pressed="false">🏪 Specialty</button>

    <button class="filter-chip" data-filter="co-op"
            aria-pressed="false">🌱 Co-op</button>

    <span id="store-count" aria-live="polite" aria-atomic="true">Loading…</span>
  </div>

  <!-- ── Map ──────────────────────────────────────────────────────── -->
  <div id="map" role="application" aria-label="Grocery store map"></div>

</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/WLEo=" crossorigin=""></script>
<!-- Marker Cluster JS -->
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<!-- App logic -->
<script src="app.js"></script>
</body>
</html>
