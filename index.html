<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grocery Map · WWU Basic Needs Hub</title>
  <meta name="description" content="Interactive grocery store map for Western Washington University's Basic Needs Hub." />

  <!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Marker Cluster CSS -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <!-- App styles -->
  <link rel="stylesheet" href="styles.css?v=99" />
</head>
<body>
<div id="app">

  <!-- ── Header ──────────────────────────────────────────────────── -->
 <header role="banner" class="topbar">
  <div class="header-brand">
    <img src="bnh-logo.png" alt="Basic Needs Hub logo" class="brand-logo" />
    <div class="brand-text">
      <div class="brand-title">Basic Needs Hub</div>
      <div class="brand-sub">WESTERN WASHINGTON UNIVERSITY</div>
    </div>
  </div>

  <div class="header-actions">
    <button id="btn-wwu" class="btn btn-primary" aria-label="Center map on WWU campus">
      <span class="btn-icon">+</span>
      Center on WWU
    </button>

    <a id="btn-wta"
       class="btn btn-secondary"
       href="https://schedules.ridewta.com/"
       target="_blank"
       rel="noopener"
       aria-label="Open WTA Trip Planner in a new tab">
      🚌 WTA Trip Planner
    </a>
  </div>
</header>

 <!-- ── Filter bar ───────────────────────────────────────────────── -->
<div id="filter-bar" role="group" aria-label="Filter grocery stores">
  <span class="filter-label">Filter:</span>

  <button class="filter-chip" data-filter="ebt" aria-pressed="false">EBT Accepted</button>
  <button class="filter-chip" data-filter="discount" aria-pressed="false">Budget-Friendly</button>
  <button class="filter-chip" data-filter="supermarket" aria-pressed="false">🛒 Supermarket</button>
  <button class="filter-chip" data-filter="specialty" aria-pressed="false">🏪 Specialty</button>
  <button class="filter-chip" data-filter="co-op" aria-pressed="false">🌱 Co-op</button>
  <button class="filter-chip" data-filter="bulk" aria-pressed="false">📦 Bulk</button>

  <!-- Optional but recommended if app.js still references it -->
  <span id="store-count" aria-live="polite" aria-atomic="true"></span>

  <span id="filter-status" aria-live="polite" aria-atomic="true">Loading…</span>

  <button id="clear-filters" class="filter-clear" type="button" aria-label="Clear all filters" disabled>
    Clear Filters
  </button>
</div>

<!-- ── Map ──────────────────────────────────────────────────────── -->
<div id="map" role="application" aria-label="Grocery store map"></div>

</div> <!-- end #app -->

<!-- Marker Cluster JS -->
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<!-- App logic -->
<script src="app.js"></script>
</body>
</html>
